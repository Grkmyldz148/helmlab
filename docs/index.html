<h3>Installation</h3>
<pre><code>pip install -e .</code></pre>

<h3>Quick Start</h3>
<pre><code><span class="kw">from</span> colorspace.helmlab <span class="kw">import</span> Helmlab

hl = Helmlab()

<span class="cm"># sRGB [0,1] \u2192 Helmlab Lab</span>
lab = hl.<span class="fn">from_srgb</span>([<span class="num">0.2</span>, <span class="num">0.5</span>, <span class="num">0.8</span>])
<span class="cm"># \u2192 [L, a, b] where L \u2208 [0,1]</span>

<span class="cm"># Back to sRGB (round-trip error < 10\u207b\u00b9\u2074)</span>
rgb = hl.<span class="fn">to_srgb</span>(lab)

<span class="cm"># Hex input/output</span>
lab = hl.<span class="fn">from_hex</span>(<span class="str">"#3B82F6"</span>)
hex = hl.<span class="fn">to_hex</span>(lab)   <span class="cm"># \u2192 "#3b82f6"</span>

<span class="cm"># Color difference</span>
d = hl.<span class="fn">delta_e</span>(<span class="str">"#ff0000"</span>, <span class="str">"#00ff00"</span>)
</code></pre>

<div class="note">Helmlab\u2019s L is normalized to [0, 1], not [0, 100] like CIE L*. Chroma and hue are derived from a, b as usual: C = \u221a(a\u00b2 + b\u00b2), H = atan2(b, a).</div>
`,

<h3>Constructor</h3>
<div class="method">
  <div class="method-sig"><code><span class="name">Helmlab</span>(<span class="param">surround</span><span class="type">=0.5</span>, <span class="param">neutral_correction</span><span class="type">=True</span>, <span class="param">ab_rotate_deg</span><span class="type">=-28.2</span>)</code></div>
  <div class="method-desc"><code>surround</code> sets the viewing context: 0 = dark, 0.5 = normal (default), 1 = bright. Neutral correction and rotation are on by default (recommended).</div>
</div>

<h3>Color Conversion</h3>
<table>
<tr><th>Method</th><th>Description</th></tr>
<tr><td><code>from_srgb(rgb)</code></td><td>sRGB [0,1] \u2192 Lab [L, a, b]</td></tr>
<tr><td><code>to_srgb(lab)</code></td><td>Lab \u2192 sRGB [0,1] (gamut mapped)</td></tr>
<tr><td><code>from_hex(hex)</code></td><td><code>"#rrggbb"</code> \u2192 Lab</td></tr>
<tr><td><code>to_hex(lab)</code></td><td>Lab \u2192 <code>"#rrggbb"</code></td></tr>
<tr><td><code>to_displayp3(lab)</code></td><td>Lab \u2192 Display P3 [0,1]</td></tr>
<tr><td><code>to_hex_p3(lab)</code></td><td>Lab \u2192 <code>color(display-p3 r g b)</code></td></tr>
<tr><td><code>info(hex)</code></td><td>Returns dict with hex, sRGB, XYZ, Lab, L, C, H, luminance</td></tr>
</table>

<h3>GenSpace Conversion</h3>
<table>
<tr><th>Method</th><th>Description</th></tr>
<tr><td><code>gen_from_hex(hex)</code></td><td><code>"#rrggbb"</code> &rarr; GenSpace Lab</td></tr>
<tr><td><code>gen_to_hex(lab)</code></td><td>GenSpace Lab &rarr; <code>"#rrggbb"</code> (gamut mapped)</td></tr>
<tr><td><code>gen_from_srgb(rgb)</code></td><td>sRGB [0,1] &rarr; GenSpace Lab</td></tr>
<tr><td><code>gen_to_srgb(lab)</code></td><td>GenSpace Lab &rarr; sRGB [0,1] (gamut mapped)</td></tr>
</table>
<div class="note">GenSpace is optimized for generation (gradients, palettes). MetricSpace (default) is optimized for perceptual distance. Use <code>gen_*</code> methods when producing colors, default methods when measuring differences.</div>

<h3>Gradient &amp; Distance</h3>
<div class="method">
  <div class="method-sig"><code><span class="name">gradient</span>(<span class="param">start_hex</span>, <span class="param">end_hex</span>, <span class="param">steps</span><span class="type">=16</span>) &rarr; <span class="ret">list[str]</span></code></div>
  <div class="method-desc">Uniform gradient via CIEDE2000 arc-length reparameterization (CV &asymp; 0% on any color pair). Interpolates in GenSpace Lab, then redistributes steps for equal perceptual spacing.</div>
</div>
<div class="method">
  <div class="method-sig"><code><span class="name">delta_e</span>(<span class="param">hex1</span>, <span class="param">hex2</span>) &rarr; <span class="ret">float</span></code></div>
  <div class="method-desc">Euclidean distance in MetricSpace Lab between two hex colors.</div>
</div>

<h3>Gamut Checking</h3>
<table>
<tr><th>Method</th><th>Description</th></tr>
<tr><td><code>is_in_srgb(lab)</code></td><td>Check if Lab coordinates map to valid sRGB</td></tr>
<tr><td><code>is_in_p3(lab)</code></td><td>Check if Lab coordinates map to valid Display P3</td></tr>
</table>

<h3>Contrast &amp; Accessibility</h3>
<div class="method">

<table>
<tr><th>Method</th><th>Description</th></tr>
<tr><td><code>contrast_ratio(fg, bg)</code></td><td>WCAG contrast ratio (1.0\u201321.0)</td></tr>
<tr><td><code>meets_contrast(fg, bg, "AA")</code></td><td>Check WCAG level (AA: 4.5:1, AAA: 7:1)</td></tr>
</table>

  <div class="method-desc">Generates a lightness palette (L from 0.95 to 0.15) preserving hue and chroma of the base color.</div>
</div>
<div class="method">

  <div class="method-desc">Tailwind-style scale (50\u2013950). Base maps to 500.</div>
</div>
<div class="method">

  <div class="method-desc">Hue ring at fixed L and C. Useful for categorical color sets.</div>
</div>

<h3>Dark/Light Mode</h3>
<div class="method">

  <div class="method-desc">Mode-adapt a foreground/background pair and enforce contrast.</div>
</div>
`,

    content: {
      en: `
<p>Helmlab maps CIE XYZ (D65) to a perceptually-organized Lab space through 13 stages. Every stage is analytically invertible via Newton iteration, achieving round-trip error below 10\u207b\u2076.</p>

<div class="pipe-row" id="pipeVis"></div>

<p>All 72 parameters (65 space + 7 distance metric) are jointly optimized against COMBVD (3,813 color pairs) using L-BFGS-B with 8 random restarts.</p>

<h3>Stage 1\u20133: Linear Algebra Core</h3>
<div class="math">
  <div class="math-label">XYZ \u2192 LMS \u2192 power compression \u2192 Lab</div>
  <code>[l, m, s] = M\u2081 \u00b7 [X, Y, Z]</code><br>
  <code>[l', m', s'] = [sign(l)\u00b7|l|<sup>\u03b3\u2081</sup>, sign(m)\u00b7|m|<sup>\u03b3\u2082</sup>, sign(s)\u00b7|s|<sup>\u03b3\u2083</sup>]</code><br>
  <code>[L, a, b] = M\u2082 \u00b7 [l', m', s']</code>
</div>
<p>M\u2081 and M\u2082 are optimized 3\u00d73 matrices (9 + 9 = 18 params). The three independent gammas allow different compression per cone channel. This is where Helmlab differs from Oklab (which uses a shared cube root).</p>

<h3>Stage 4: Hue Correction</h3>
<div class="math">
  <code>h' = h + \u2211<sub>k=1..4</sub> (c<sub>k</sub> cos(kh) + s<sub>k</sub> sin(kh))</code>
</div>
<p>A 4-harmonic Fourier correction rotates the hue angle to fix systematic hue distortions, particularly in the blue-purple region (~270\u00b0). 8 parameters.</p>

<h3>Stage 5: Helmholtz-Kohlrausch Embedding</h3>
<div class="math">
  <code>L \u2190 L + w \u00b7 C<sup>\u03b1</sup> \u00b7 f(h)</code><br>
  <code>f(h) = 1 + \u03b2\u2081 cos(h) + \u03b2\u2082 sin(h) + \u03b2\u2083 cos(2h) + \u03b2\u2084 sin(2h)</code>
</div>
<p>Saturated colors appear brighter than grays at the same luminance. Instead of a post-hoc correction, Helmlab bakes this directly into L. The hue-dependent weighting reflects that blue and red show stronger H-K effects. 6 parameters.</p>

<h3>Stage 6: Lightness Correction</h3>
<div class="math">
  <code>t = L(1-L)</code><br>
  <code>L \u2190 L + p\u2081 t + p\u2082 t(0.5-L) + p\u2083 t\u00b2 + t \u00b7 (c cos(h) + s sin(h))</code>
</div>
<p>A cubic polynomial with a hue-dependent term reshapes the lightness curve. The L(1-L) basis naturally preserves the 0 and 1 endpoints. 5 parameters.</p>

<h3>Stage 7: Dark Lightness Compression</h3>
<div class="math">
  <code>L \u2190 L \u00b7 exp(d \u00b7 L(1-L)\u00b2)</code>
</div>
<p>Compresses lightness in the dark region where human sensitivity is higher. 3 parameters (base + hue-dependent).</p>

<h3>Stages 8\u201312: Chroma Processing &amp; Interactions</h3>
<p>Five stages process chroma with hue-dependent scaling, power compression, L-dependent scaling, HLC interaction, and hue-dependent lightness. These stages capture the complex interplay between perceived lightness, chroma, and hue. 23 parameters total.</p>

<h3>Stage 13: Neutral Correction (NC)</h3>
<div class="math">
  <div class="math-label">Structural achromatic guarantee</div>
  <code>a<sub>out</sub> = a - a<sub>err</sub>(L)</code><br>
  <code>b<sub>out</sub> = b - b<sub>err</sub>(L)</code>
</div>
<p>The key innovation of v20b. A lookup table (256 gray Y values \u2192 PCHIP interpolation) subtracts the achromatic error from the enrichment pipeline\u2019s output. This guarantees C < 10\u207b\u2076 for all grays, mathematically, regardless of the optimized parameters. Applied at the end of the pipeline to avoid disrupting hue interactions. Cost: only +0.04 STRESS points vs the unconstrained optimum.</p>

<h3>Post-pipeline: Rigid Rotation</h3>
<div class="math">
  <code>a' = a cos(\u03c6) - b sin(\u03c6)</code><br>
  <code>b' = a sin(\u03c6) + b cos(\u03c6)</code><br>
  <code>\u03c6 = -28.2\u00b0 (minimax optimal)</code>
</div>
<p>A rigid rotation in the ab plane is an isometry \u2014 it changes no distances, so COMBVD STRESS is exactly preserved. The angle is chosen to minimize worst-case hue error. Free improvement: hue_max 48.4\u00b0 \u2192 20.2\u00b0.</p>
`,
      tr: `
<p>Helmlab, CIE XYZ (D65) koordinatlar\u0131n\u0131 13 a\u015famada alg\u0131sal olarak d\u00fczenlenen bir Lab uzay\u0131na d\u00f6n\u00fc\u015ft\u00fcr\u00fcr. Her a\u015fama Newton iterasyonu ile analitik olarak terslenebilir; round-trip hatas\u0131 10\u207b\u2076\u2019n\u0131n alt\u0131ndad\u0131r.</p>

<div class="pipe-row" id="pipeVis"></div>

<p>T\u00fcm 72 parametre (65 uzay + 7 mesafe metrigi) COMBVD (3.813 renk \u00e7ifti) \u00fczerinde 8 rastgele ba\u015flat\u0131ml\u0131 L-BFGS-B ile ortak optimize edilmi\u015ftir.</p>

<h3>A\u015fama 1\u20133: Lineer Cebir \u00c7ekirde\u011fi</h3>
<div class="math">

<p>M\u2081 ve M\u2082 optimize edilmi\u015f 3\u00d73 matrislerdir (9 + 9 = 18 parametre). \u00dc\u00e7 ba\u011f\u0131ms\u0131z gamma, her kon kanal\u0131 i\u00e7in farkl\u0131 s\u0131k\u0131\u015ft\u0131rmaya izin verir. Oklab\u2019\u0131n payla\u015f\u0131lan k\u00fcp k\u00f6k\u00fcnden farkl\u0131 olan budur.</p>

<h3>A\u015fama 4: Hue D\u00fczeltme</h3>
<div class="math">
  <code>h' = h + \u2211<sub>k=1..4</sub> (c<sub>k</sub> cos(kh) + s<sub>k</sub> sin(kh))</code>
</div>
<p>4 harmonikli Fourier d\u00fczeltmesi, \u00f6zellikle mavi-mor b\u00f6lgesindeki (~270\u00b0) sistematik ton bozulmalar\u0131n\u0131 d\u00fczeltir. 8 parametre.</p>

<h3>A\u015fama 5: Helmholtz-Kohlrausch G\u00f6mm\u00fclmesi</h3>

  <code>f(h) = 1 + \u03b2\u2081 cos(h) + \u03b2\u2082 sin(h) + \u03b2\u2083 cos(2h) + \u03b2\u2084 sin(2h)</code>
</div>
<p>Doygun renkler ayn\u0131 luminanstaki grilerden daha parlak alg\u0131lan\u0131r. Helmlab bunu sonradan d\u00fczeltme yerine do\u011frudan L\u2019ye g\u00f6mer. Ton ba\u011f\u0131ml\u0131 a\u011f\u0131rl\u0131kland\u0131rma, mavi ve k\u0131rm\u0131z\u0131n\u0131n daha g\u00fc\u00e7l\u00fc H-K etkisi g\u00f6sterdi\u011fini yans\u0131t\u0131r. 6 parametre.</p>

<h3>A\u015fama 6: Lightness D\u00fczeltme</h3>
<div class="math">
  <code>t = L(1-L)</code><br>
  <code>L \u2190 L + p\u2081 t + p\u2082 t(0.5-L) + p\u2083 t\u00b2 + t \u00b7 (c cos(h) + s sin(h))</code>
</div>
<p>Ton ba\u011f\u0131ml\u0131 terimli k\u00fcbik polinom, parlakl\u0131k e\u011frisini yeniden \u015fekillendirir. L(1-L) baz\u0131, 0 ve 1 u\u00e7 noktalar\u0131n\u0131 do\u011fal olarak korur. 5 parametre.</p>

<h3>A\u015fama 7: Koyu B\u00f6lge S\u0131k\u0131\u015ft\u0131rmas\u0131</h3>
<div class="math">
  <code>L \u2190 L \u00b7 exp(d \u00b7 L(1-L)\u00b2)</code>
</div>
<p>\u0130nsan duyarl\u0131l\u0131\u011f\u0131n\u0131n daha y\u00fcksek oldu\u011fu koyu b\u00f6lgede lightness\u2019\u0131 s\u0131k\u0131\u015ft\u0131r\u0131r. 3 parametre.</p>

<h3>A\u015fama 8\u201312: Kroma \u0130\u015fleme ve Etkile\u015fimler</h3>
<p>Be\u015f a\u015fama kromay\u0131 ton ba\u011f\u0131ml\u0131 \u00f6l\u00e7ekleme, g\u00fc\u00e7 s\u0131k\u0131\u015ft\u0131rma, L-ba\u011f\u0131ml\u0131 \u00f6l\u00e7ekleme, HLC etkile\u015fimi ve ton ba\u011f\u0131ml\u0131 lightness ile i\u015fler. Toplam 23 parametre.</p>

<h3>Pipeline Sonras\u0131: Rijit Rotasyon</h3>

    content: {
      en: `
<p>Helmlab\u2019s color difference formula is a generalized Minkowski metric with compression:</p>
<div class="math">
  <code>\u0394E<sub>raw</sub> = (|\u0394L|<sup>p</sup> + w<sub>C</sub>(|\u0394a|<sup>p</sup> + |\u0394b|<sup>p</sup>))<sup>1/p</sup></code><br>
  <code>\u0394E = (\u0394E<sub>raw</sub> / (1 + c \u00b7 \u0394E<sub>raw</sub>))<sup>q</sup></code>
</div>
<p>7 parameters: <code>p</code> (Minkowski exponent, ~0.83), <code>w<sub>C</sub></code> (chroma weight, ~1.03), <code>c</code> (compression, ~1.59), <code>q</code> (post-power, 1.1).</p>
<p>The compression term <code>1/(1+c\u00b7\u0394E)</code> models the diminishing sensitivity to large color differences \u2014 doubling \u0394E doesn\u2019t double perceived difference.</p>

<h3>Benchmarks</h3>

// Render
// ═══════════════════════════════════════════════════════════════
function render() {
  document.documentElement.lang = currentLang;
  document.title = t('page_title');

  // Static i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = t(el.dataset.i18n);
  });

  // TOC
  let tocHtml = '';
  sections.forEach((s, i) => {
    tocHtml += `<li><a href="#${s.id}"><span class="num">${i+1}.</span> ${s.title[currentLang]}</a></li>`;
  });
  document.getElementById('tocList').innerHTML = tocHtml;

  // Content
  let html = '';
  sections.forEach((s, i) => {
    html += `<h2 id="${s.id}"><span class="num">${i+1}</span>${s.title[currentLang]}</h2>`;
    html += s.content[currentLang];
  });
  document.getElementById('content').innerHTML = html;

  // Pipeline visualization
  const pipeEl = document.getElementById('pipeVis');
  if (pipeEl) {
    const steps = [
      ['1','XYZ\u2192LMS','M\u2081'],['2',currentLang==='tr'?'G\u00fc\u00e7':'Power','|x|^\u03b3'],
      ['3','LMS\u2192Lab','M\u2082'],['4','Hue',currentLang==='tr'?'4 harm.':'4 harm.'],
      ['5','H-K','C^\u03b1\u00b7f(h)'],['6','L corr.',currentLang==='tr'?'k\u00fcbik':'cubic'],
      ['7','Dark L','exp'],['8',currentLang==='tr'?'C \u00f6l\u00e7ek':'C scale','4h exp'],
      ['9','C power','C^p(h)'],['10','L\u00d7C','exp(poly)'],
      ['11','HLC','h\u00d7L\u00d7C'],['12','Hue-L','exp(F(h))'],
      ['13','NC',currentLang==='tr'?'N\u00f6tral':'Neutral']
    ];
    let ph = '';
    steps.forEach((s, i) => {
      if (i > 0) ph += '<span class="pipe-arrow">\u2192</span>';
      const isNC = s[0] === '13';
      ph += `<div class="pipe-step"${isNC?' style="border-color:#60a5fa;"':''}>
        <div class="n">${s[0]}</div><div class="name">${s[1]}</div><div class="detail">${s[2]}</div></div>`;
    });
    pipeEl.innerHTML = ph;
  }
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('langTR').classList.toggle('active', lang === 'tr');
  document.getElementById('langEN').classList.toggle('active', lang === 'en');
  render();
}

render();
</script>
