<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helmlab Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #09090b; color: #a1a1aa; line-height: 1.6; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { color: #fafafa; font-size: 1.5em; margin-bottom: 8px; }
    .subtitle { color: #52525b; font-size: 0.9em; margin-bottom: 32px; }

    /* Login */
    .login-wrap { max-width: 360px; margin: 120px auto 0; background: #111113; border: 1px solid #27272a; border-radius: 12px; padding: 32px; }
    .login-wrap h1 { text-align: center; margin-bottom: 24px; }
    .input { width: 100%; background: #09090b; border: 1px solid #27272a; border-radius: 8px; padding: 12px 16px; color: #fafafa; font-family: inherit; font-size: 0.92em; margin-bottom: 12px; }
    .input:focus { outline: none; border-color: #3f3f46; }
    .input::placeholder { color: #52525b; }
    textarea.input { min-height: 200px; resize: vertical; line-height: 1.6; }
    .login-btn { width: 100%; background: #f97316; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 0.92em; font-weight: 600; cursor: pointer; }
    .login-btn:hover { background: #ea580c; }
    .login-error { color: #ef4444; font-size: 0.85em; text-align: center; margin-top: 12px; display: none; }

    /* Dashboard */
    .dashboard { display: none; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .logout-btn { background: transparent; border: 1px solid #27272a; border-radius: 6px; padding: 6px 14px; color: #71717a; font-size: 0.82em; cursor: pointer; }
    .logout-btn:hover { border-color: #3f3f46; color: #a1a1aa; }

    /* Main tabs (Comments / Blog) */
    .main-tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid #27272a; padding-bottom: 12px; }
    .main-tab { background: transparent; border: 1px solid transparent; border-radius: 8px; padding: 10px 24px; color: #71717a; font-size: 0.92em; font-weight: 600; cursor: pointer; }
    .main-tab:hover { color: #a1a1aa; }
    .main-tab.active { background: #1e1e22; color: #fafafa; border-color: #27272a; }

    /* Sub tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab { background: transparent; border: 1px solid #27272a; border-radius: 8px; padding: 8px 20px; color: #a1a1aa; font-size: 0.85em; cursor: pointer; }
    .tab:hover { border-color: #3f3f46; }
    .tab.active { background: #27272a; color: #fafafa; border-color: #3f3f46; }
    .tab .count { display: inline-block; background: #f97316; color: #fff; font-size: 0.75em; font-weight: 700; border-radius: 10px; padding: 1px 7px; margin-left: 6px; }

    /* Cards */
    .card { background: #111113; border: 1px solid #27272a; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .card-name { color: #fafafa; font-weight: 600; font-size: 0.95em; }
    .card-date { color: #52525b; font-size: 0.8em; }
    .card-email { color: #52525b; font-size: 0.8em; margin-bottom: 10px; }
    .card-message { color: #d4d4d8; font-size: 0.92em; line-height: 1.6; margin-bottom: 16px; white-space: pre-wrap; }
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 6px; padding: 6px 16px; font-size: 0.82em; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.85; }
    .btn-green { background: #22c55e; color: #fff; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-gray { background: #52525b; color: #fff; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .btn-orange { background: #f97316; color: #fff; }

    .empty-state { text-align: center; padding: 48px 20px; color: #52525b; }
    .section { display: none; }
    .section.active { display: block; }

    /* Blog editor */
    .editor-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .editor-row .input { margin-bottom: 0; }
    .editor-row .input.grow { flex: 1; }
    .tag-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag-chip { background: #1e293b; color: #60a5fa; font-size: 0.78em; padding: 4px 10px; border-radius: 12px; display: flex; align-items: center; gap: 4px; }
    .tag-chip button { background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 1.1em; line-height: 1; }
    .upload-area { border: 2px dashed #27272a; border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 12px; cursor: pointer; }
    .upload-area:hover { border-color: #3f3f46; }
    .upload-area img { max-height: 120px; border-radius: 4px; margin-top: 8px; }
    select.input { appearance: auto; }
    .blog-card-title { color: #fafafa; font-weight: 700; font-size: 1.05em; margin-bottom: 4px; }
    .blog-card-excerpt { color: #a1a1aa; font-size: 0.88em; margin-bottom: 8px; }
    .blog-card-meta { color: #52525b; font-size: 0.8em; }
    .status-badge { font-size: 0.72em; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
    .status-badge.published { background: #166534; color: #4ade80; }
    .status-badge.draft { background: #713f12; color: #fbbf24; }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-wrap" id="loginView">
    <h1>Helmlab Admin</h1>
    <form id="loginForm">
      <input type="text" class="input" id="loginUser" placeholder="Username" autocomplete="username" required>
      <input type="password" class="input" id="loginPass" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" class="login-btn">Sign in</button>
      <div class="login-error" id="loginError">Invalid credentials</div>
    </form>
  </div>

  <!-- Dashboard -->
  <div class="container dashboard" id="dashboardView">
    <div class="top-bar">
      <h1>Helmlab Admin</h1>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </div>

    <div class="main-tabs">
      <button class="main-tab active" data-section="comments">Comments</button>
      <button class="main-tab" data-section="blogs">Blog Posts</button>
      <button class="main-tab" data-section="editor">New Post</button>
    </div>

    <!-- Comments Section -->
    <div class="section active" id="sec-comments">
      <div class="tabs">
        <button class="tab active" data-status="pending">Pending <span class="count" id="pendingCount">0</span></button>
        <button class="tab" data-status="approved">Approved</button>
        <button class="tab" data-status="rejected">Rejected</button>
      </div>
      <div id="commentList"></div>
    </div>

    <!-- Blog List Section -->
    <div class="section" id="sec-blogs">
      <div class="tabs">
        <button class="tab active" data-blog-status="">All</button>
        <button class="tab" data-blog-status="published">Published</button>
        <button class="tab" data-blog-status="draft">Draft</button>
      </div>
      <div id="blogList"></div>
    </div>

    <!-- Blog Editor Section -->
    <div class="section" id="sec-editor">
      <h2 style="color:#fafafa;margin-bottom:16px" id="editorTitle">New Blog Post</h2>
      <input type="hidden" id="editId">
      <input type="text" class="input" id="blogTitleInput" placeholder="Post title">
      <input type="text" class="input" id="blogExcerpt" placeholder="Short excerpt (for cards & SEO)">
      <input type="text" class="input" id="blogAuthor" placeholder="Author (default: Admin)">

      <div class="editor-row">
        <input type="text" class="input grow" id="tagInput" placeholder="Add tag + Enter">
        <select class="input" id="blogStatus" style="width:140px">
          <option value="draft">Draft</option>
          <option value="published">Published</option>
        </select>
      </div>
      <div class="tag-chips" id="tagChips"></div>

      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div>Click to upload cover image (max 10MB)</div>
        <img id="coverPreview" style="display:none" alt="Cover preview">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
      </div>
      <input type="hidden" id="coverImageUrl">

      <textarea class="input" id="blogContent" placeholder="Post content (HTML)"></textarea>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-blue" onclick="savePost()">Save Post</button>
        <button class="btn btn-gray" onclick="resetEditor()">Cancel</button>
        <button class="btn btn-orange" style="margin-left:auto" onclick="insertImage()">Insert Image</button>
      </div>
      <div id="editorMsg" style="margin-top:12px;font-size:0.88em;display:none"></div>
    </div>
  </div>

<script>
const API = 'https://helmlab.space/api';
let token = sessionStorage.getItem('admin_token') || '';
let commentStatus = 'pending';
let blogStatusFilter = '';
let editorTags = [];

// ── Auth ──────────────────────────────────────────────
const loginForm = document.getElementById('loginForm');
const loginView = document.getElementById('loginView');
const dashboard = document.getElementById('dashboardView');

if (token) showDashboard();

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const res = await fetch(API + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value }),
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    token = data.token;
    sessionStorage.setItem('admin_token', token);
    showDashboard();
  } catch { document.getElementById('loginError').style.display = 'block'; }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  token = ''; sessionStorage.removeItem('admin_token');
  dashboard.style.display = 'none'; loginView.style.display = 'block';
});

function showDashboard() {
  loginView.style.display = 'none'; dashboard.style.display = 'block';
  loadComments(); loadBlogs();
}

function authHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }

// ── Main tabs ─────────────────────────────────────────
document.querySelectorAll('.main-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + tab.dataset.section).classList.add('active');
  });
});

// ── Comments ──────────────────────────────────────────
document.querySelectorAll('[data-status]').forEach(tab => {
  tab.addEventListener('click', () => {
    tab.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    commentStatus = tab.dataset.status;
    loadComments();
  });
});

async function loadComments() {
  const list = document.getElementById('commentList');
  list.innerHTML = '<div class="empty-state">Loading...</div>';
  try {
    const res = await fetch(API + '/admin/comments?status=' + commentStatus, { headers: authHeaders() });
    if (res.status === 401) { token = ''; sessionStorage.removeItem('admin_token'); dashboard.style.display = 'none'; loginView.style.display = 'block'; return; }
    const comments = await res.json();
    if (commentStatus === 'pending') document.getElementById('pendingCount').textContent = comments.length;
    if (!comments.length) { list.innerHTML = '<div class="empty-state">No ' + commentStatus + ' comments.</div>'; return; }
    list.innerHTML = comments.map(c => `
      <div class="card">
        <div class="card-header"><span class="card-name">${esc(c.name)}</span><span class="card-date">${fmtDate(c.created_at)}</span></div>
        ${c.email ? `<div class="card-email">${esc(c.email)}</div>` : ''}
        <div class="card-message">${esc(c.message)}</div>
        <div class="card-actions">
          ${commentStatus !== 'approved' ? `<button class="btn btn-green" onclick="updateComment('${c.id}','approved')">Approve</button>` : ''}
          ${commentStatus !== 'rejected' ? `<button class="btn btn-red" onclick="updateComment('${c.id}','rejected')">Reject</button>` : ''}
          <button class="btn btn-gray" onclick="deleteComment('${c.id}')">Delete</button>
        </div>
      </div>
    `).join('');
  } catch { list.innerHTML = '<div class="empty-state">Failed to load.</div>'; }
}

async function updateComment(id, status) {
  await fetch(API + '/admin/comments/' + id, { method: 'PATCH', headers: authHeaders(), body: JSON.stringify({ status }) });
  loadComments();
}

async function deleteComment(id) {
  if (!confirm('Delete permanently?')) return;
  await fetch(API + '/admin/comments/' + id, { method: 'DELETE', headers: authHeaders() });
  loadComments();
}

// ── Blogs ─────────────────────────────────────────────
document.querySelectorAll('[data-blog-status]').forEach(tab => {
  tab.addEventListener('click', () => {
    tab.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    blogStatusFilter = tab.dataset.blogStatus;
    loadBlogs();
  });
});

async function loadBlogs() {
  const list = document.getElementById('blogList');
  list.innerHTML = '<div class="empty-state">Loading...</div>';
  try {
    const url = API + '/admin/blogs' + (blogStatusFilter ? '?status=' + blogStatusFilter : '');
    const res = await fetch(url, { headers: authHeaders() });
    const blogs = await res.json();
    if (!blogs.length) { list.innerHTML = '<div class="empty-state">No blog posts.</div>'; return; }
    list.innerHTML = blogs.map(b => `
      <div class="card">
        <div class="card-header">
          <span class="blog-card-title">${esc(b.title)}</span>
          <span class="status-badge ${b.status}">${b.status}</span>
        </div>
        <div class="blog-card-excerpt">${esc(b.excerpt || '')}</div>
        <div class="card-header">
          <span class="blog-card-meta">${esc(b.author||'Admin')} &middot; ${fmtDate(b.created_at)}</span>
          <div class="card-actions">
            <button class="btn btn-blue" onclick="editBlog('${b._id}')">Edit</button>
            <button class="btn btn-gray" onclick="deleteBlog('${b._id}')">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
  } catch { list.innerHTML = '<div class="empty-state">Failed to load.</div>'; }
}

async function editBlog(id) {
  try {
    const res = await fetch(API + '/admin/blogs/' + id, { headers: authHeaders() });
    const blog = await res.json();
    document.getElementById('editId').value = id;
    document.getElementById('blogTitleInput').value = blog.title;
    document.getElementById('blogExcerpt').value = blog.excerpt || '';
    document.getElementById('blogAuthor').value = blog.author || '';
    document.getElementById('blogContent').value = blog.content || '';
    document.getElementById('blogStatus').value = blog.status;
    document.getElementById('coverImageUrl').value = blog.cover_image || '';
    editorTags = blog.tags || [];
    renderTags();
    if (blog.cover_image) { document.getElementById('coverPreview').src = blog.cover_image; document.getElementById('coverPreview').style.display = 'block'; }
    document.getElementById('editorTitle').textContent = 'Edit Post';

    // Switch to editor tab
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-section="editor"]').classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-editor').classList.add('active');
  } catch (e) { alert('Failed to load post: ' + e.message); }
}

async function deleteBlog(id) {
  if (!confirm('Delete this blog post permanently?')) return;
  await fetch(API + '/admin/blogs/' + id, { method: 'DELETE', headers: authHeaders() });
  loadBlogs();
}

// ── Editor ────────────────────────────────────────────
document.getElementById('tagInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !editorTags.includes(val)) { editorTags.push(val); renderTags(); }
    e.target.value = '';
  }
});

function renderTags() {
  document.getElementById('tagChips').innerHTML = editorTags.map((t, i) =>
    `<span class="tag-chip">${esc(t)} <button onclick="removeTag(${i})">&times;</button></span>`
  ).join('');
}

function removeTag(i) { editorTags.splice(i, 1); renderTags(); }

function resetEditor() {
  document.getElementById('editId').value = '';
  document.getElementById('blogTitleInput').value = '';
  document.getElementById('blogExcerpt').value = '';
  document.getElementById('blogAuthor').value = '';
  document.getElementById('blogContent').value = '';
  document.getElementById('blogStatus').value = 'draft';
  document.getElementById('coverImageUrl').value = '';
  document.getElementById('coverPreview').style.display = 'none';
  editorTags = [];
  renderTags();
  document.getElementById('editorTitle').textContent = 'New Blog Post';
  document.getElementById('editorMsg').style.display = 'none';
}

async function savePost() {
  const id = document.getElementById('editId').value;
  const body = {
    title: document.getElementById('blogTitleInput').value,
    excerpt: document.getElementById('blogExcerpt').value,
    author: document.getElementById('blogAuthor').value || 'Admin',
    content: document.getElementById('blogContent').value,
    status: document.getElementById('blogStatus').value,
    cover_image: document.getElementById('coverImageUrl').value,
    tags: editorTags,
  };

  if (!body.title || !body.content) { showMsg('Title and content are required.', '#ef4444'); return; }

  try {
    const url = id ? API + '/admin/blogs/' + id : API + '/admin/blogs';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showMsg(id ? 'Post updated!' : 'Post created!', '#22c55e');
    if (!id) resetEditor();
    loadBlogs();
  } catch (e) { showMsg('Error: ' + e.message, '#ef4444'); }
}

function showMsg(msg, color) {
  const el = document.getElementById('editorMsg');
  el.textContent = msg; el.style.color = color; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ── Image upload ──────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append('image', file);

  try {
    const res = await fetch(API + '/admin/upload', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: formData,
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('coverImageUrl').value = data.url;
    document.getElementById('coverPreview').src = data.url;
    document.getElementById('coverPreview').style.display = 'block';
  } catch (err) { alert('Upload failed: ' + err.message); }
});

async function insertImage() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0]; if (!file) return;
    const formData = new FormData();
    formData.append('image', file);
    try {
      const res = await fetch(API + '/admin/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: formData });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const ta = document.getElementById('blogContent');
      const tag = `<img src="${data.url}" alt="" style="max-width:100%">`;
      ta.setRangeText(tag, ta.selectionStart, ta.selectionEnd, 'end');
    } catch (err) { alert('Upload failed: ' + err.message); }
  };
  input.click();
}
</script>
</body>
</html>
