<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palette Generator &mdash; Helmlab</title>
  <meta name="description" content="Generate perceptually uniform color palettes from any brand color. Tailwind-style 50-950 scales, WCAG contrast checking, and one-click export.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="canonical" href="https://helmlab.space/palette">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* Palette page overrides */
    .palette-hero {
      padding: 100px 0 32px;
      text-align: center;
    }
    .palette-hero h1 {
      font-size: 2.2em;
      font-weight: 800;
      color: #fafafa;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .palette-hero p {
      color: #71717a;
      font-size: 1em;
      max-width: 560px;
      margin: 0 auto;
    }

    /* Controls */
    .pal-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pal-presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Scale output */
    .pal-scale {
      margin-top: 8px;
    }
    .pal-strip {
      display: flex;
      border-radius: 12px;
      overflow: hidden;
      height: 88px;
      border: 1px solid #1c1c1e;
    }
    .pal-swatch {
      flex: 1;
      min-width: 0;
      position: relative;
      cursor: pointer;
      transition: flex 0.2s;
    }
    .pal-swatch:hover {
      flex: 2;
    }
    .pal-swatch-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 4px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.15s;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.68em;
      font-weight: 700;
      line-height: 1.3;
      pointer-events: none;
    }
    .pal-swatch:hover .pal-swatch-info {
      opacity: 1;
    }
    .pal-labels {
      display: flex;
      margin-top: 8px;
    }
    .pal-label {
      flex: 1;
      min-width: 0;
      text-align: center;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.72em;
      font-weight: 700;
      color: #52525b;
    }
    .pal-label.active { color: #fafafa; }

    /* Detail cards */
    .pal-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 8px;
      margin-top: 28px;
    }
    .pal-detail-card {
      border-radius: 10px;
      padding: 14px 8px 10px;
      text-align: center;
      border: 1px solid #1c1c1e;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .pal-detail-card:hover {
      transform: translateY(-2px);
      border-color: #3f3f46;
    }
    .pal-detail-card.is-500 {
      border-color: #60a5fa;
    }
    .pal-detail-level {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.72em;
      font-weight: 800;
      margin-bottom: 6px;
      display: block;
    }
    .pal-detail-hex {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.72em;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    .pal-detail-contrast {
      font-size: 0.65em;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
    }
    .pal-detail-contrast.pass { background: rgba(52, 211, 153, 0.12); color: #34d399; }
    .pal-detail-contrast.fail { background: rgba(248, 113, 113, 0.12); color: #f87171; }

    /* Export */
    .pal-export {
      margin-top: 32px;
    }
    .pal-export-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .pal-export-header h3 {
      font-size: 1em;
      font-weight: 700;
      color: #fafafa;
    }
    .pal-export-tabs {
      display: flex;
      gap: 4px;
    }
    .pal-export-tab {
      background: #111113;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #71717a;
      font-family: inherit;
      font-size: 0.78em;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pal-export-tab.active {
      color: #fafafa;
      background: #27272a;
      border-color: #3f3f46;
    }
    .pal-export-tab:hover:not(.active) { color: #a1a1aa; }
    .pal-export-code {
      background: #111113;
      border: 1px solid #27272a;
      border-radius: 10px;
      padding: 18px 22px;
      position: relative;
      overflow: hidden;
    }
    .pal-export-code pre {
      padding: 0;
      font-size: 0.82em;
      line-height: 1.6;
      color: #a1a1aa;
      overflow-x: auto;
    }
    .pal-copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #a1a1aa;
      font-family: inherit;
      font-size: 0.72em;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pal-copy-btn:hover { background: #3f3f46; color: #fafafa; }
    .pal-copy-btn.copied { color: #34d399; border-color: #34d399; }

    /* Copied toast */
    .pal-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.85em;
      font-weight: 600;
      color: #34d399;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .pal-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 768px) {
      .pal-controls {
        flex-direction: column;
        align-items: stretch;
      }
      .pal-controls .color-pick {
        justify-content: center;
      }
      .pal-strip { height: 64px; }
      .pal-labels { display: none; }
      .pal-details {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }
      .pal-export-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <main>
    <section class="palette-hero">
      <div class="container">
        <h1>Palette Generator</h1>
        <p>Pick any brand color and get a full Tailwind-style 50&ndash;950 scale. Every step is perceptually even &mdash; no dead zones, no jumps. Click any swatch to copy its hex code.</p>
      </div>
    </section>

    <section class="section" style="padding-top:0">
      <div class="container">
        <!-- Controls -->
        <div class="pal-controls">
          <div class="color-pick">
            <label for="pal-color">Brand color</label>
            <input type="color" id="pal-color" value="#3b82f6">
            <input type="text" id="pal-hex" value="#3b82f6" maxlength="7" class="hex-input" aria-label="Brand color hex">
          </div>
          <div class="pal-presets">
            <button type="button" class="preset-btn pal-preset" data-color="#3b82f6">Blue</button>
            <button type="button" class="preset-btn pal-preset" data-color="#ef4444">Red</button>
            <button type="button" class="preset-btn pal-preset" data-color="#22c55e">Green</button>
            <button type="button" class="preset-btn pal-preset" data-color="#f97316">Orange</button>
            <button type="button" class="preset-btn pal-preset" data-color="#a855f7">Purple</button>
            <button type="button" class="preset-btn pal-preset" data-color="#06b6d4">Cyan</button>
            <button type="button" class="preset-btn pal-preset" data-color="#ec4899">Pink</button>
            <button type="button" class="preset-btn pal-preset" data-color="#eab308">Yellow</button>
          </div>
        </div>

        <!-- Scale strip -->
        <div class="pal-scale">
          <div class="pal-strip" id="pal-strip"></div>
          <div class="pal-labels" id="pal-labels"></div>
        </div>

        <!-- Detail cards -->
        <div class="pal-details" id="pal-details"></div>

        <!-- Export -->
        <div class="pal-export">
          <div class="pal-export-header">
            <h3>Export</h3>
            <div class="pal-export-tabs">
              <button type="button" class="pal-export-tab active" data-fmt="css">CSS</button>
              <button type="button" class="pal-export-tab" data-fmt="tailwind">Tailwind</button>
              <button type="button" class="pal-export-tab" data-fmt="json">JSON</button>
            </div>
          </div>
          <div class="pal-export-code">
            <button type="button" class="pal-copy-btn" id="pal-copy-export">Copy</button>
            <pre><code id="pal-export-output"></code></pre>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <!-- Toast -->
  <div class="pal-toast" id="pal-toast">Copied!</div>

  <script src="js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/helmlab@latest/dist/index.global.js"></script>
  <script>
  (function() {
    'use strict';

    var hl = null;
    var LEVELS = ['50','100','200','300','400','500','600','700','800','900','950'];
    var currentScale = {};
    var currentFmt = 'css';
    var currentName = 'blue';

    function srgbToLinear(c) {
      return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    }
    function hexToRgb(hex) {
      hex = hex.replace('#', '');
      return [parseInt(hex.slice(0,2),16)/255, parseInt(hex.slice(2,4),16)/255, parseInt(hex.slice(4,6),16)/255];
    }
    function luminance(hex) {
      var rgb = hexToRgb(hex);
      return 0.2126 * srgbToLinear(rgb[0]) + 0.7152 * srgbToLinear(rgb[1]) + 0.0722 * srgbToLinear(rgb[2]);
    }
    function contrastRatio(hex1, hex2) {
      var l1 = luminance(hex1), l2 = luminance(hex2);
      var lighter = Math.max(l1, l2), darker = Math.min(l1, l2);
      return (lighter + 0.05) / (darker + 0.05);
    }

    function showToast(msg) {
      var t = document.getElementById('pal-toast');
      t.textContent = msg || 'Copied!';
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 1500);
    }

    function guessColorName(hex) {
      var presets = document.querySelectorAll('.pal-preset');
      for (var i = 0; i < presets.length; i++) {
        if (presets[i].getAttribute('data-color').toLowerCase() === hex.toLowerCase()) {
          return presets[i].textContent.toLowerCase();
        }
      }
      return 'brand';
    }

    function renderScale(hex) {
      if (!hl) return;
      currentScale = hl.semanticScale(hex);
      currentName = guessColorName(hex);

      var strip = document.getElementById('pal-strip');
      var labels = document.getElementById('pal-labels');
      var details = document.getElementById('pal-details');

      var stripHtml = '';
      var labelsHtml = '';
      var detailsHtml = '';

      for (var i = 0; i < LEVELS.length; i++) {
        var lv = LEVELS[i];
        var color = currentScale[lv];
        var lum = luminance(color);
        var textColor = lum > 0.18 ? '#09090b' : '#fafafa';

        // Strip
        stripHtml += '<div class="pal-swatch" style="background:' + color + '" data-hex="' + color + '" title="Click to copy ' + color + '">' +
          '<div class="pal-swatch-info" style="color:' + textColor + '">' + lv + '<br>' + color + '</div></div>';

        // Labels
        labelsHtml += '<div class="pal-label' + (lv === '500' ? ' active' : '') + '">' + lv + '</div>';

        // Detail card
        var crWhite = contrastRatio(color, '#ffffff');
        var crBlack = contrastRatio(color, '#000000');
        var wcag = crBlack >= 4.5 ? 'AA on black' : (crWhite >= 4.5 ? 'AA on white' : 'Needs adj.');
        var wcagClass = (crBlack >= 4.5 || crWhite >= 4.5) ? 'pass' : 'fail';

        detailsHtml += '<div class="pal-detail-card' + (lv === '500' ? ' is-500' : '') + '" style="background:' + color + '" data-hex="' + color + '" title="Click to copy">' +
          '<span class="pal-detail-level" style="color:' + textColor + '">' + lv + '</span>' +
          '<span class="pal-detail-hex" style="color:' + textColor + '">' + color + '</span>' +
          '<span class="pal-detail-contrast ' + wcagClass + '">' + wcag + '</span>' +
          '</div>';
      }

      strip.innerHTML = stripHtml;
      labels.innerHTML = labelsHtml;
      details.innerHTML = detailsHtml;

      // Click to copy on swatches and detail cards
      var clickables = document.querySelectorAll('.pal-swatch, .pal-detail-card');
      for (var c = 0; c < clickables.length; c++) {
        clickables[c].addEventListener('click', function() {
          var h = this.getAttribute('data-hex');
          navigator.clipboard.writeText(h).then(function() { showToast('Copied ' + h); });
        });
      }

      renderExport();
    }

    function renderExport() {
      var output = document.getElementById('pal-export-output');
      if (!output) return;
      var name = currentName;

      if (currentFmt === 'css') {
        var lines = ':root {\n';
        for (var i = 0; i < LEVELS.length; i++) {
          lines += '  --color-' + name + '-' + LEVELS[i] + ': ' + currentScale[LEVELS[i]] + ';\n';
        }
        lines += '}';
        output.textContent = lines;
      } else if (currentFmt === 'tailwind') {
        var lines2 = "// tailwind.config.js\nmodule.exports = {\n  theme: {\n    extend: {\n      colors: {\n        '" + name + "': {\n";
        for (var j = 0; j < LEVELS.length; j++) {
          lines2 += "          '" + LEVELS[j] + "': '" + currentScale[LEVELS[j]] + "'" + (j < LEVELS.length - 1 ? ',' : '') + '\n';
        }
        lines2 += '        }\n      }\n    }\n  }\n}';
        output.textContent = lines2;
      } else {
        var obj = {};
        for (var k = 0; k < LEVELS.length; k++) {
          obj[LEVELS[k]] = currentScale[LEVELS[k]];
        }
        output.textContent = JSON.stringify(obj, null, 2);
      }
    }

    function init() {
      // Init helmlab
      if (typeof helmlab !== 'undefined' && helmlab.Helmlab) {
        hl = new helmlab.Helmlab();
      }

      var colorPicker = document.getElementById('pal-color');
      var hexInput = document.getElementById('pal-hex');

      if (colorPicker) {
        colorPicker.addEventListener('input', function() {
          if (hexInput) hexInput.value = this.value;
          renderScale(this.value);
        });
      }
      if (hexInput) {
        hexInput.addEventListener('change', function() {
          if (/^#[0-9a-fA-F]{6}$/.test(this.value)) {
            if (colorPicker) colorPicker.value = this.value;
            renderScale(this.value);
          }
        });
      }

      // Presets
      var presets = document.querySelectorAll('.pal-preset');
      for (var i = 0; i < presets.length; i++) {
        presets[i].addEventListener('click', function() {
          var c = this.getAttribute('data-color');
          if (colorPicker) colorPicker.value = c;
          if (hexInput) hexInput.value = c;
          renderScale(c);
        });
      }

      // Export tabs
      var tabs = document.querySelectorAll('.pal-export-tab');
      for (var t = 0; t < tabs.length; t++) {
        tabs[t].addEventListener('click', function() {
          for (var tt = 0; tt < tabs.length; tt++) tabs[tt].classList.remove('active');
          this.classList.add('active');
          currentFmt = this.getAttribute('data-fmt');
          renderExport();
        });
      }

      // Copy export
      var copyBtn = document.getElementById('pal-copy-export');
      if (copyBtn) {
        copyBtn.addEventListener('click', function() {
          var text = document.getElementById('pal-export-output').textContent;
          var btn = this;
          navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 1500);
          });
        });
      }

      // Retry if helmlab not loaded yet
      if (!hl) {
        var retries = 0;
        var interval = setInterval(function() {
          retries++;
          if (typeof helmlab !== 'undefined' && helmlab.Helmlab) {
            hl = new helmlab.Helmlab();
            renderScale(hexInput ? hexInput.value : '#3b82f6');
            clearInterval(interval);
          } else if (retries > 50) {
            clearInterval(interval);
          }
        }, 100);
      } else {
        renderScale(hexInput ? hexInput.value : '#3b82f6');
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
